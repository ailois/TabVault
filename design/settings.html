<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabVault Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义下拉箭头 */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%237A8A7D' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position-x: 98%;
            background-position-y: 50%;
        }
        /* 隐藏原生取色器的默认外观，保留功能 */
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#F4F7F4] text-[#2A332C] font-sans antialiased flex h-screen">

    <aside class="w-64 bg-white border-r border-[#E8ECE8] flex flex-col shadow-[2px_0_8px_rgba(0,0,0,0.02)] z-10">
        <div class="p-6 mb-4">
            <h1 class="font-bold text-xl flex items-center gap-2">
                <div class="w-6 h-6 bg-[#6B8E73] rounded-md shadow-sm"></div>
                TabVault
            </h1>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="#" class="block px-4 py-2.5 text-sm bg-[#F4F7F4] text-[#6B8E73] font-medium rounded-lg transition">⚙️ 架构配置</a>
            <a href="#" class="block px-4 py-2.5 text-sm text-[#7A8A7D] hover:bg-[#F9FAF9] hover:text-[#2A332C] font-medium rounded-lg transition">📚 知识库管理</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#F4F7F4]">
        <header class="p-8 pb-4 flex-shrink-0">
            <h2 class="text-2xl font-bold mb-1">架构配置</h2>
            <p class="text-sm text-[#7A8A7D]">配置大语言模型 (LLM) 接口协议、体验外观和自动化行为。</p>
        </header>

        <div class="flex-1 overflow-y-auto px-8 py-4 space-y-8">
            
            <div class="bg-white border border-[#6B8E73]/30 p-4 rounded-xl shadow-sm flex justify-between items-center">
                <div>
                    <h4 class="text-sm font-semibold text-[#6B8E73] mb-1">Trial active</h4>
                    <p class="text-xs text-[#7A8A7D]">Try TabVault free for 3 days. 50 analyses remaining.</p>
                </div>
                <button class="bg-[#6B8E73] hover:bg-[#5A7A61] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
                    Activate now
                </button>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8 pb-12">
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.03)] border border-[#E8ECE8]">
                        <h3 class="font-semibold text-base text-[#2A332C] mb-4">伴读引擎协议 (Provider)</h3>
                        
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            
                            <label class="cursor-pointer relative">
                                <input type="radio" name="provider" value="openai-chat" class="peer sr-only" checked>
                                <div class="p-3 rounded-xl border-2 border-[#E8ECE8] peer-checked:border-[#6B8E73] peer-checked:bg-[#F4F7F4] hover:bg-[#F9FAF9] transition flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-lg border border-[#E8ECE8]">💬</div>
                                    <div class="flex flex-col">
                                        <span class="text-sm font-semibold text-[#2A332C]">OpenAI Chat</span>
                                        <span class="text-[10px] text-[#7A8A7D] font-mono mt-0.5">/v1/chat/completions</span>
                                    </div>
                                    <div class="absolute top-2 right-2 w-2 h-2 rounded-full bg-[#6B8E73] opacity-0 peer-checked:opacity-100 transition"></div>
                                </div>
                            </label>

                            <label class="cursor-pointer relative">
                                <input type="radio" name="provider" value="openai-response" class="peer sr-only">
                                <div class="p-3 rounded-xl border-2 border-[#E8ECE8] peer-checked:border-[#6B8E73] peer-checked:bg-[#F4F7F4] hover:bg-[#F9FAF9] transition flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-lg border border-[#E8ECE8]">📄</div>
                                    <div class="flex flex-col">
                                        <span class="text-sm font-semibold text-[#2A332C]">OpenAI Response</span>
                                        <span class="text-[10px] text-[#7A8A7D] font-mono mt-0.5">/v1/responses</span>
                                    </div>
                                </div>
                            </label>

                            <label class="cursor-pointer relative">
                                <input type="radio" name="provider" value="claude" class="peer sr-only">
                                <div class="p-3 rounded-xl border-2 border-[#E8ECE8] peer-checked:border-[#6B8E73] peer-checked:bg-[#F4F7F4] hover:bg-[#F9FAF9] transition flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-lg border border-[#E8ECE8]">🧠</div>
                                    <div class="flex flex-col">
                                        <span class="text-sm font-semibold text-[#2A332C]">Claude</span>
                                        <span class="text-[10px] text-[#7A8A7D] mt-0.5">Anthropic Messages</span>
                                    </div>
                                </div>
                            </label>

                            <label class="cursor-pointer relative">
                                <input type="radio" name="provider" value="gemini" class="peer sr-only">
                                <div class="p-3 rounded-xl border-2 border-[#E8ECE8] peer-checked:border-[#6B8E73] peer-checked:bg-[#F4F7F4] hover:bg-[#F9FAF9] transition flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-lg border border-[#E8ECE8]">✨</div>
                                    <div class="flex flex-col">
                                        <span class="text-sm font-semibold text-[#2A332C]">Gemini</span>
                                        <span class="text-[10px] text-[#7A8A7D] mt-0.5">Google AI Studio</span>
                                    </div>
                                </div>
                            </label>
                        </div>

                        <div class="space-y-4 pt-2 border-t border-[#E8ECE8]">
                            <div>
                                <label class="block text-xs font-medium text-[#7A8A7D] mb-1.5 flex justify-between">
                                    <span>API Key</span>
                                    <span class="text-[#e63946] opacity-80">必填</span>
                                </label>
                                <input type="password" placeholder="sk-..." class="w-full bg-[#F4F7F4] border border-[#E8ECE8] rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-[#6B8E73] focus:ring-1 focus:ring-[#6B8E73] transition">
                            </div>
                            
                            <div>
                                <label class="block text-xs font-medium text-[#7A8A7D] mb-1.5 flex justify-between">
                                    <span>Model (模型名称)</span>
                                    <span class="text-[#e63946] opacity-80">必填</span>
                                </label>
                                <input type="text" value="gpt-4o-mini" class="w-full bg-[#F4F7F4] border border-[#E8ECE8] rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-[#6B8E73] focus:ring-1 focus:ring-[#6B8E73] transition">
                            </div>
                            
                            <div>
                                <label class="block text-xs font-medium text-[#7A8A7D] mb-1.5">Base URL (代理/自定义节点地址)</label>
                                <input type="text" value="https://api.openai.com/v1" class="w-full bg-[#F4F7F4] border border-[#E8ECE8] rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-[#6B8E73] focus:ring-1 focus:ring-[#6B8E73] transition">
                            </div>
                        </div>

                        <div class="mt-5 pt-4 border-t border-[#E8ECE8] flex items-center justify-between">
                            <span class="text-xs text-[#7A8A7D] flex items-center gap-1">
                                <span class="w-2 h-2 rounded-full bg-gray-300"></span> 尚未测试连通性
                            </span>
                            <button class="text-sm text-[#6B8E73] hover:text-[#5A7A61] font-medium transition">测试连接 (Test)</button>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.03)] border border-[#E8ECE8]">
                        <h3 class="font-semibold text-base text-[#2A332C] mb-6">体验与自动化</h3>

                        <div class="space-y-6">
                            <div>
                                <label class="block text-xs font-medium text-[#7A8A7D] mb-3">界面主题 (Theme)</label>
                                <div class="grid grid-cols-3 gap-3">
                                    <label class="cursor-pointer">
                                        <input type="radio" name="theme" value="sage" class="peer sr-only" checked>
                                        <div class="bg-[#F4F7F4] border-2 border-[#6B8E73] text-[#6B8E73] text-center py-2 rounded-lg text-sm font-medium transition flex items-center justify-center gap-1.5 shadow-sm">
                                            <span class="w-3 h-3 rounded-full bg-[#6B8E73]"></span> 鼠尾草
                                        </div>
                                    </label>
                                    
                                    <label class="cursor-pointer">
                                        <input type="radio" name="theme" value="breeze" class="peer sr-only">
                                        <div class="bg-white border-2 border-[#E8ECE8] text-[#7A8A7D] text-center py-2 rounded-lg text-sm font-medium hover:bg-[#F9FAF9] peer-checked:border-[#5B7C99] peer-checked:text-[#5B7C99] transition flex items-center justify-center gap-1.5">
                                            <span class="w-3 h-3 rounded-full bg-[#5B7C99]"></span> 海风蓝
                                        </div>
                                    </label>

                                    <label class="cursor-pointer">
                                        <input type="radio" name="theme" value="vanilla" class="peer sr-only">
                                        <div class="bg-white border-2 border-[#E8ECE8] text-[#7A8A7D] text-center py-2 rounded-lg text-sm font-medium hover:bg-[#F9FAF9] peer-checked:border-[#D4A373] peer-checked:text-[#D4A373] transition flex items-center justify-center gap-1.5">
                                            <span class="w-3 h-3 rounded-full bg-[#D4A373]"></span> 香草色
                                        </div>
                                    </label>

                                    <label class="cursor-pointer">
                                        <input type="radio" name="theme" value="cloud" class="peer sr-only">
                                        <div class="bg-white border-2 border-[#E8ECE8] text-[#7A8A7D] text-center py-2 rounded-lg text-sm font-medium hover:bg-[#F9FAF9] peer-checked:border-[#475569] peer-checked:text-[#475569] transition flex items-center justify-center gap-1.5">
                                            <span class="w-3 h-3 rounded-full border border-gray-300 bg-[#FAFAFA]"></span> 极简浅
                                        </div>
                                    </label>

                                    <label class="cursor-pointer">
                                        <input type="radio" name="theme" value="obsidian" class="peer sr-only">
                                        <div class="bg-[#1C1C1F] border-2 border-[#2C2C2F] text-[#909096] text-center py-2 rounded-lg text-sm font-medium hover:bg-[#2C2C2F] peer-checked:border-[#8BA1B7] peer-checked:text-[#8BA1B7] transition flex items-center justify-center gap-1.5">
                                            <span class="w-3 h-3 rounded-full bg-[#121214] border border-[#2C2C2F]"></span> 深邃暗
                                        </div>
                                    </label>

                                    <label class="cursor-pointer relative overflow-hidden group">
                                        <input type="radio" name="theme" value="custom" class="peer sr-only">
                                        <div class="bg-white border-2 border-[#E8ECE8] text-[#7A8A7D] text-center py-2 rounded-lg text-sm font-medium hover:bg-[#F9FAF9] peer-checked:border-gray-800 peer-checked:text-gray-800 transition flex items-center justify-center gap-1.5 h-full">
                                            🎨 自定义
                                        </div>
                                        <input type="color" value="#FF6B6B" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" title="点击选择您的专属强调色">
                                    </label>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-medium text-[#7A8A7D] mb-1.5">界面语言</label>
                                    <select class="w-full bg-[#F4F7F4] border border-[#E8ECE8] rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-[#6B8E73] text-[#2A332C] cursor-pointer transition">
                                        <option>中文</option>
                                        <option>English</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-[#7A8A7D] mb-1.5">摘要语言</label>
                                    <select class="w-full bg-[#F4F7F4] border border-[#E8ECE8] rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-[#6B8E73] text-[#2A332C] cursor-pointer transition">
                                        <option>自动跟随内容</option>
                                        <option>始终使用中文</option>
                                        <option>始终使用英文</option>
                                    </select>
                                </div>
                            </div>

                            <div class="space-y-5 pt-6 border-t border-[#E8ECE8]">
                                <div class="flex justify-between items-center">
                                    <span class="text-sm font-medium text-[#2A332C]">保存时自动分析</span>
                                    <label class="relative inline-flex items-center cursor-pointer flex-shrink-0">
                                        <input type="checkbox" class="sr-only peer">
                                        <div class="w-11 h-6 bg-[#E8ECE8] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-[#E8ECE8] after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#6B8E73]"></div>
                                    </label>
                                </div>

                                <div class="flex justify-between items-center">
                                    <span class="text-sm font-medium text-[#2A332C]">分析失败时自动重试</span>
                                    <label class="relative inline-flex items-center cursor-pointer flex-shrink-0">
                                        <input type="checkbox" class="sr-only peer" checked>
                                        <div class="w-11 h-6 bg-[#E8ECE8] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-[#E8ECE8] after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#6B8E73]"></div>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="bg-white border-t border-[#E8ECE8] p-4 px-8 flex justify-between items-center flex-shrink-0 shadow-[0_-2px_10px_rgba(0,0,0,0.02)] z-20">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#6B8E73] shadow-[0_0_4px_rgba(107,142,115,0.5)]"></span>
                <span class="text-sm text-[#7A8A7D]">就绪</span>
            </div>
            <button class="bg-[#6B8E73] hover:bg-[#5A7A61] text-white font-medium px-8 py-2.5 rounded-lg shadow-[0_2px_8px_rgba(107,142,115,0.2)] transition flex items-center gap-2">
                <span>保存设置</span>
            </button>
        </footer>
    </main>

</body>
</html>
