<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabVault - Side Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { bg: 'var(--bg-color)', surface: 'var(--surface-color)', border: 'var(--border-color)', primary: 'var(--primary-text)', secondary: 'var(--secondary-text)', accent: 'var(--accent-color)' } } } }
  </script>
  <style>
    :root { --bg-color: #F4F6F9; --surface-color: #FFFFFF; --border-color: #DEE2E6; --primary-text: #212529; --secondary-text: #6C757D; --accent-color: #5E6AD2; }
   .dark { --bg-color: #1C1E23; --surface-color: #25282E; --border-color: #383C42; --primary-text: #E1E1E1; --secondary-text: #8A8F98; --accent-color: #7986CB; }
    body { transition: background-color 0.3s ease, color 0.3s ease; }
   .custom-scrollbar::-webkit-scrollbar { width: 4px; }
   .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }
  </style>
</head>
<body class="bg-bg text-primary font-sans h-screen flex flex-col w-full border-l border-border">
  
  <div class="p-4 border-b border-border bg-surface shrink-0">
    <div class="flex justify-between items-center mb-3">
      <span class="text-sm font-bold tracking-wide">TabVault AI</span>
      <button onclick="document.documentElement.classList.toggle('dark')" class="text-secondary hover:text-accent">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
      </button>
    </div>
    <div class="relative group">
      <svg class="absolute left-3 top-2.5 w-4 h-4 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <input type="text" placeholder="语义搜索书签... (⌘K)" class="w-full bg-bg border border-border rounded-lg pl-9 pr-10 py-2 text-sm focus:outline-none focus:border-accent text-primary transition" />
    </div>
  </div>

  <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4">
    <div class="flex flex-col space-y-3">
      <div class="bg-surface border border-border rounded-xl rounded-tl-sm p-3 text-sm shadow-sm max-w-[90%]">
        <p class="mb-2">我已经阅读了当前页面，这是一篇关于《React 19 并发特性》的深度文章。你想了解什么？</p>
        <div class="flex flex-wrap gap-2">
          <span class="text-[10px] bg-bg border border-border px-2 py-1 rounded cursor-pointer hover:text-accent">总结核心观点</span>
          <span class="text-[10px] bg-bg border border-border px-2 py-1 rounded cursor-pointer hover:text-accent">列出相关代码片段</span>
        </div>
      </div>
      <div class="bg-accent/10 border border-accent/20 rounded-xl rounded-tr-sm p-3 text-sm shadow-sm max-w-[90%] self-end text-accent">
        useMemo 在新版本中还需要手动写吗？
      </div>
      <div class="bg-surface border border-border rounded-xl rounded-tl-sm p-3 text-sm shadow-sm max-w-[90%]">
        不需要了。文章在第二段提到，React 19 引入了 React Compiler，它会在构建时自动进行底层记忆化优化（Memoization），从而彻底消除了开发者手动编写 <code>useMemo</code> 和 <code>useCallback</code> 的心智负担。
      </div>
    </div>
  </div>

  <div class="p-3 border-t border-border bg-surface shrink-0">
    <div class="relative">
      <input type="text" placeholder="向 Ghostreader 提问..." class="w-full bg-bg border border-border rounded-xl pl-3 pr-10 py-2.5 text-sm focus:outline-none focus:border-accent text-primary shadow-inner" />
      <button class="absolute right-2 top-2 w-7 h-7 bg-accent text-white rounded-lg flex items-center justify-center hover:opacity-90">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
      </button>
    </div>
  </div>
</body>
</html>
