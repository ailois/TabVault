<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabVault Sidepanel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { width: 100%; height: 100vh; }
    </style>
</head>
<body class="bg-[#FDFBF7] text-[#3A3530] font-sans antialiased flex flex-col h-screen">
    <header class="bg-white px-4 py-3 shadow-sm z-10 flex justify-between items-center border-b border-[#F5F2E9]">
        <div class="flex items-center gap-2">
            <div class="w-5 h-5 bg-[#D4A373] rounded shadow-sm text-white text-xs flex items-center justify-center">✨</div>
            <span class="font-bold text-sm">Ghostreader</span>
        </div>
        <span class="text-xs text-[#D4A373] bg-[#FDFBF7] px-2 py-1 rounded-md border border-[#F5F2E9]">Trial Active</span>
    </header>

    <div class="px-4 py-2 text-xs text-[#8C857E] flex items-center gap-2 bg-[#FDFBF7]">
        <span>📄 当前：Google Gemini</span>
        <span class="w-1 h-1 bg-[#8C857E] rounded-full"></span>
        <span>已连接 469 个书签</span>
    </div>

    <main class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
        <div class="flex gap-3">
            <div class="w-6 h-6 rounded bg-[#D4A373] flex-shrink-0 mt-1"></div>
            <div class="bg-white p-3 rounded-xl shadow-sm border border-[#F5F2E9] text-sm leading-relaxed max-w-[85%]">
                我已经阅读了当前页面。关于这篇内容，或者你的知识库，你想了解什么？
                <div class="flex gap-2 mt-3">
                    <button class="text-xs bg-[#FDFBF7] border border-[#F5F2E9] px-2 py-1 rounded-md hover:text-[#D4A373]">总结要点</button>
                    <button class="text-xs bg-[#FDFBF7] border border-[#F5F2E9] px-2 py-1 rounded-md hover:text-[#D4A373]">查找相关书签</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-[#FDFBF7]">
        <div class="relative">
            <input type="text" placeholder="输入文字对话，或输入 '/' 搜索书签..." class="w-full bg-white border border-[#F5F2E9] shadow-sm rounded-xl py-3 pl-4 pr-12 text-sm focus:outline-none focus:ring-1 focus:ring-[#D4A373] focus:border-[#D4A373] transition">
            <button class="absolute right-2 top-2 bottom-2 bg-[#D4A373] hover:bg-[#C39362] text-white p-1.5 w-8 rounded-lg transition flex items-center justify-center">
                ↑
            </button>
        </div>
        <div class="text-center mt-3">
            <button class="text-xs text-[#8C857E] hover:text-[#3A3530] transition flex items-center justify-center gap-1 mx-auto">
                <span>🔄</span> 同步本地书签
            </button>
        </div>
    </footer>
</body>
</html>
