<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabVault Popup - Unsynced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { width: 360px; margin: 0; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        /* 轻微的呼吸动画，吸引用户点击分析 */
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft { animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#F4F7F4] text-[#2A332C] font-sans antialiased flex flex-col h-full border border-[#E8ECE8]">

    <header class="p-4 pb-3 flex justify-between items-center bg-white border-b border-[#E8ECE8]">
        <div class="flex items-center gap-2 cursor-pointer group" title="打开完整工作台">
            <div class="w-5 h-5 bg-[#6B8E73] rounded shadow-sm flex items-center justify-center text-white text-[10px] group-hover:bg-[#5A7A61] transition">✦</div>
            <span class="font-bold text-sm text-[#2A332C] group-hover:text-[#6B8E73] transition">TabVault</span>
        </div>
        <div class="flex gap-2">
            <button class="w-7 h-7 flex items-center justify-center rounded-md bg-[#F4F7F4] text-[#7A8A7D] hover:text-[#2A332C] hover:bg-[#E8ECE8] transition" title="搜索知识库">🔍</button>
            <button class="w-7 h-7 flex items-center justify-center rounded-md bg-[#F4F7F4] text-[#7A8A7D] hover:text-[#2A332C] hover:bg-[#E8ECE8] transition" title="偏好设置">⚙️</button>
        </div>
    </header>

    <main class="p-4 flex flex-col gap-3">
        
        <div class="flex justify-between items-center">
            <span class="text-[11px] font-bold text-[#7A8A7D] uppercase tracking-wider">当前页面 (Current Page)</span>
            <div class="flex items-center gap-1.5 bg-white text-[#7A8A7D] px-2 py-0.5 rounded-full text-[10px] font-medium border border-[#E8ECE8]">
                <span class="w-1.5 h-1.5 rounded-full border border-[#7A8A7D]"></span>
                尚未收录
            </div>
        </div>

        <div class="bg-white rounded-xl p-3 shadow-[0_2px_8px_rgba(0,0,0,0.02)] border border-[#E8ECE8]">
            <div class="flex gap-2 items-start mb-3">
                <img src="https://vitejs.dev/logo.svg" class="w-4 h-4 mt-0.5 opacity-80" alt="icon">
                <div>
                    <h2 class="font-semibold text-[13px] leading-tight text-[#2A332C] mb-1 line-clamp-2">Vite | Next Generation Frontend Tooling</h2>
                    <p class="text-[10px] text-[#7A8A7D] truncate max-w-[280px]">cn.vitejs.dev/guide</p>
                </div>
            </div>

            <div class="bg-[#FAFCFA] border border-dashed border-[#6B8E73]/40 p-3 rounded-lg flex flex-col items-center justify-center gap-2 py-5 relative overflow-hidden group">
                <div class="absolute -top-4 -right-4 w-12 h-12 bg-[#6B8E73]/10 rounded-full blur-xl animate-pulse-soft"></div>
                
                <span class="text-xl opacity-80 mb-1">✨</span>
                <p class="text-[11px] text-[#2A332C] font-medium">让 AI 帮你阅读这篇文章</p>
                <p class="text-[10px] text-[#7A8A7D] text-center max-w-[200px] leading-relaxed">
                    点击下方按钮，TabVault 将自动提取核心要点并生成智能标签，存入你的数字大脑。
                </p>
            </div>
        </div>

        <div class="flex flex-col gap-2 mt-1">
            <button class="w-full bg-[#6B8E73] hover:bg-[#5A7A61] text-white text-[13px] font-medium py-2.5 rounded-lg shadow-[0_2px_8px_rgba(107,142,115,0.2)] transition flex items-center justify-center gap-2 group">
                <span class="group-hover:scale-110 transition-transform">⭐</span> 收藏并深度分析
            </button>
            
            <button class="w-full bg-transparent hover:bg-[#E8ECE8]/50 text-[#7A8A7D] hover:text-[#2A332C] text-xs font-medium py-2 rounded-lg transition">
                仅基础收藏 (不使用 AI)
            </button>
        </div>
    </main>

</body>
</html>
