<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabVault - Popup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { bg: 'var(--bg-color)', surface: 'var(--surface-color)', border: 'var(--border-color)', primary: 'var(--primary-text)', secondary: 'var(--secondary-text)', accent: 'var(--accent-color)' } } } }
  </script>
  <style>
    :root { --bg-color: #F4F6F9; --surface-color: #FFFFFF; --border-color: #DEE2E6; --primary-text: #212529; --secondary-text: #6C757D; --accent-color: #5E6AD2; }
   .dark { --bg-color: #1C1E23; --surface-color: #25282E; --border-color: #383C42; --primary-text: #E1E1E1; --secondary-text: #8A8F98; --accent-color: #7986CB; }
    body { width: 320px; transition: all 0.3s ease; }
  </style>
</head>
<body class="bg-bg text-primary font-sans p-4">
  <div class="flex justify-between items-center mb-5">
    <div class="flex items-center space-x-2 font-bold text-sm">
      <div class="w-3 h-3 bg-accent rounded-sm rotate-45"></div>
      <span>TabVault</span>
    </div>
    <button onclick="document.documentElement.classList.toggle('dark')" class="text-secondary hover:text-accent transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
    </button>
  </div>

  <div class="bg-surface border border-border rounded-xl p-4 shadow-sm mb-4">
    <div class="text-xs text-secondary mb-1 truncate">正在浏览</div>
    <div class="text-sm font-medium line-clamp-2 mb-3">React 19 并发渲染机制深度解析与实战指南</div>
    
    <button class="w-full bg-accent text-white font-medium py-2 rounded-lg text-sm hover:opacity-90 transition shadow-sm mb-2 flex justify-center items-center">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
      一键保存并 AI 分析
    </button>
  </div>

  <div class="grid grid-cols-2 gap-2 text-sm">
    <button class="bg-surface border border-border py-2 rounded-lg text-secondary hover:text-primary transition flex justify-center items-center">
      打开侧边栏
    </button>
    <button class="bg-surface border border-border py-2 rounded-lg text-secondary hover:text-primary transition flex justify-center items-center">
      控制台
    </button>
  </div>
</body>
</html>
